<!-- STYLES CSS pour les onglets (à ajouter dans le <style>) -->
<style>
/* Système d'onglets */
.modal-tabs {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
    border-bottom: 1px solid rgba(255,255,255,0.1);
}
.modal-tab {
    background: transparent;
    border: none;
    color: var(--text-secondary);
    padding: 10px 20px;
    cursor: pointer;
    font-size: 0.9rem;
    font-weight: 500;
    transition: var(--transition);
    position: relative;
    border-bottom: 2px solid transparent;
}
.modal-tab:hover {
    color: var(--text-primary);
}
.modal-tab.active {
    color: var(--accent-color);
    border-bottom-color: var(--accent-color);
}
.modal-tab-content {
    display: none;
}
.modal-tab-content.active {
    display: block;
}
</style>

<!-- HTML du modal avec onglets -->
<div class="modal-overlay" id="modalSettings">
    <div class="modal-content">
        <div class="modal-header">
            <h3 class="modal-title">Paramètres</h3>
            <button class="modal-close" data-target="modalSettings"><i class="fas fa-times"></i></button>
        </div>
        
        <!-- Onglets -->
        <div class="modal-tabs">
            <button class="modal-tab active" data-tab="profile">
                <i class="fas fa-user"></i> Profil
            </button>
            <button class="modal-tab" data-tab="engines">
                <i class="fas fa-search"></i> Moteurs
            </button>
            <button class="modal-tab" data-tab="links">
                <i class="fas fa-link"></i> Liens
            </button>
        </div>
        
        <!-- Contenu onglet Profil -->
        <div class="modal-tab-content active" id="tab-profile">
            <label style="font-size:0.85rem; color:var(--text-secondary); display:block; margin-bottom:5px;">Texte d'accueil</label>
            <input type="text" class="modal-input" id="greetingInput" placeholder="Laisser vide pour automatique">
            
            <label style="font-size:0.85rem; color:var(--text-secondary); display:block; margin-bottom:5px;">Votre prénom</label>
            <input type="text" class="modal-input" id="nameInput" placeholder="Ex: Dune">
            <button class="btn-primary" id="saveNameBtn">Sauvegarder le profil</button>
        </div>
        
        <!-- Contenu onglet Moteurs -->
        <div class="modal-tab-content" id="tab-engines">
            <div class="links-list" id="enginesListManager"></div>
            <button class="btn-secondary" id="addEngineBtn"><i class="fas fa-plus"></i> Ajouter un moteur</button>
        </div>
        
        <!-- Contenu onglet Liens -->
        <div class="modal-tab-content" id="tab-links">
            <div class="links-list" id="linksListManager"></div>
            <button class="btn-secondary" id="addLinkBtn"><i class="fas fa-plus"></i> Ajouter un lien</button>
        </div>
    </div>
</div>

<!-- JAVASCRIPT pour gérer les onglets (à ajouter dans le <script>) -->
<script>
// Gestion des onglets
document.querySelectorAll('.modal-tab').forEach(tab => {
    tab.addEventListener('click', () => {
        const target = tab.dataset.tab;
        
        // Désactiver tous les onglets et contenus
        document.querySelectorAll('.modal-tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.modal-tab-content').forEach(c => c.classList.remove('active'));
        
        // Activer l'onglet et contenu sélectionné
        tab.classList.add('active');
        document.getElementById(`tab-${target}`).classList.add('active');
    });
});
</script>
