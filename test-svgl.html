<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test SVGL API</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background: #1a1a1a;
            color: white;
        }
        .logo-test {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 10px 0;
            padding: 10px;
            background: #2a2a2a;
            border-radius: 8px;
        }
        img {
            /* Pas de filtre - logos en couleur */
        }
    </style>
</head>
<body>
    <h1>Test SVGL Logo API</h1>
    <div id="results"></div>

    <script>
        const testSites = [
            { name: 'Google', url: 'https://www.google.com' },
            { name: 'Brave', url: 'https://search.brave.com' },
            { name: 'GitHub', url: 'https://github.com' },
            { name: 'Reddit', url: 'https://reddit.com' },
            { name: 'Twitter', url: 'https://twitter.com' },
            { name: 'Gmail', url: 'https://gmail.com' },
        ];

        async function getSvglLogo(siteName) {
            try {
                const response = await fetch(`https://api.svgl.app?search=${encodeURIComponent(siteName)}`);
                if (!response.ok) throw new Error('SVGL API error');
                
                const results = await response.json();
                if (results && results.length > 0) {
                    const logo = results[0];
                    const svgUrl = typeof logo.route === 'string' ? logo.route : logo.route.dark || logo.route.light;
                    return { found: true, url: svgUrl, data: logo };
                }
            } catch (error) {
                console.log('SVGL not found for:', siteName, error);
            }
            return { found: false };
        }

        async function testLogos() {
            const container = document.getElementById('results');
            
            for (const site of testSites) {
                const result = await getSvglLogo(site.name);
                const div = document.createElement('div');
                div.className = 'logo-test';
                
                if (result.found) {
                    div.innerHTML = `
                        <img src="${result.url}" width="24" height="24">
                        <strong>${site.name}</strong> - ✅ Trouvé sur SVGL
                        <small>(${result.data.category})</small>
                    `;
                } else {
                    div.innerHTML = `
                        <img src="https://icons.duckduckgo.com/ip3/${new URL(site.url).hostname}.ico" width="24" height="24">
                        <strong>${site.name}</strong> - ❌ Non trouvé, utilise favicon
                    `;
                }
                
                container.appendChild(div);
            }
        }

        testLogos();
    </script>
</body>
</html>
